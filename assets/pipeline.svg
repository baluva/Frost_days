<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="980" viewBox="0 0 1680 980" font-family="'Segoe UI', 'IBM Plex Sans', system-ui, sans-serif">
  <defs>
    <style>
      .eyebrow { font-family: 'Consolas','IBM Plex Mono',monospace; fill:#5A6B74; letter-spacing:6px; }
      .title   { font-family: 'Segoe UI','Space Grotesk',sans-serif; font-weight:700; fill:#0F1E27; }
      .cardnum { font-family: 'Consolas','IBM Plex Mono',monospace; letter-spacing:3px; }
      .cardttl { font-family: 'Segoe UI','Space Grotesk',sans-serif; font-weight:700; fill:#0F1E27; }
      .body    { font-family: 'Segoe UI','IBM Plex Sans',sans-serif; fill:#5A6B74; }
      .strong  { fill:#0F1E27; font-weight:600; }
      .note    { font-family: 'Segoe UI','IBM Plex Sans',sans-serif; fill:#5A6B74; }
      .notettl { font-family: 'Consolas','IBM Plex Mono',monospace; letter-spacing:3px; fill:#C2410C; }
    </style>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#15598F" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- fond -->
  <rect width="1680" height="980" fill="#EAF0F3"/>

  <!-- en-tete -->
  <text class="eyebrow" x="60" y="78" font-size="22">FROST DAYS · COMMENT ON CALCULE</text>
  <text class="title" x="58" y="142" font-size="58">De la commune au nombre de jours de gel</text>
  <!-- ligne 0 °C signature -->
  <rect x="60" y="172" width="1560" height="2" fill="#C7D5DC"/>
  <rect x="60" y="170" width="60" height="6" fill="#15598F"/>
  <text class="eyebrow" x="1556" y="166" font-size="18" text-anchor="end">0 °C</text>

  <!-- ============ CARTE 1 — COMMUNE ============ -->
  <g filter="url(#soft)">
    <rect x="60" y="230" width="430" height="370" rx="14" fill="#FFFFFF" stroke="#C7D5DC"/>
  </g>
  <rect x="60" y="230" width="6" height="370" rx="3" fill="#15598F"/>
  <text class="cardnum" x="98" y="278" font-size="20" fill="#15598F">01</text>
  <!-- icone epingle de carte -->
  <g transform="translate(225,300) scale(4.4)" fill="#15598F">
    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
  </g>
  <text class="cardttl" x="275" y="468" font-size="32" text-anchor="middle">LA COMMUNE</text>
  <text class="body" x="275" y="512" font-size="23" text-anchor="middle">On part d'une ville et d'une</text>
  <text class="body" x="275" y="544" font-size="23" text-anchor="middle">période. <tspan class="strong">Ex : Dijon, 2014–2023.</tspan></text>
  <text class="body" x="275" y="580" font-size="21" text-anchor="middle">→ on récupère sa position GPS</text>

  <!-- fleche 1 -->
  <g fill="#15598F">
    <rect x="500" y="411" width="58" height="8" rx="4"/>
    <path d="M556 397 L590 415 L556 433 Z"/>
  </g>

  <!-- ============ CARTE 2 — STATION ============ -->
  <g filter="url(#soft)">
    <rect x="625" y="230" width="430" height="370" rx="14" fill="#FFFFFF" stroke="#C7D5DC"/>
  </g>
  <rect x="625" y="230" width="6" height="370" rx="3" fill="#C2410C"/>
  <text class="cardnum" x="663" y="278" font-size="20" fill="#C2410C">02</text>
  <!-- icone thermometre -->
  <g transform="translate(790,300) scale(4.4)" fill="#C2410C">
    <path d="M15 13V5c0-1.66-1.34-3-3-3S9 3.34 9 5v8c-1.21.91-2 2.37-2 4 0 2.76 2.24 5 5 5s5-2.24 5-5c0-1.63-.79-3.09-2-4zm-4-8c0-.55.45-1 1-1s1 .45 1 1h-1v1h1v2h-1v1h1v2h-2V5z"/>
  </g>
  <text class="cardttl" x="840" y="468" font-size="32" text-anchor="middle">LA BONNE STATION</text>
  <text class="body" x="840" y="512" font-size="23" text-anchor="middle">La station météo la plus</text>
  <text class="body" x="840" y="544" font-size="23" text-anchor="middle">proche <tspan class="strong">qui mesure vraiment</tspan></text>
  <text class="body" x="840" y="576" font-size="23" text-anchor="middle"><tspan class="strong">la température.</tspan></text>

  <!-- fleche 2 -->
  <g fill="#15598F">
    <rect x="1065" y="411" width="58" height="8" rx="4"/>
    <path d="M1121 397 L1155 415 L1121 433 Z"/>
  </g>

  <!-- ============ CARTE 3 — COMPTAGE ============ -->
  <g filter="url(#soft)">
    <rect x="1190" y="230" width="430" height="370" rx="14" fill="#FFFFFF" stroke="#C7D5DC"/>
  </g>
  <rect x="1190" y="230" width="6" height="370" rx="3" fill="#15598F"/>
  <text class="cardnum" x="1228" y="278" font-size="20" fill="#15598F">03</text>
  <!-- icone flocon -->
  <g transform="translate(1355,300) scale(4.4)" fill="#15598F">
    <path d="M22 11h-4.17l3.24-3.24-1.41-1.42L15 11h-2V9l4.66-4.66-1.42-1.41L13 6.17V2h-2v4.17L7.76 2.93 6.34 4.34 11 9v2H9L4.34 6.34 2.93 7.76 6.17 11H2v2h4.17l-3.24 3.24 1.41 1.42L9 13h2v2l-4.66 4.66 1.42 1.41L11 17.83V22h2v-4.17l3.24 3.24 1.42-1.41L13 15v-2h2l4.66 4.66 1.41-1.42L17.83 13H22z"/>
  </g>
  <text class="cardttl" x="1405" y="468" font-size="32" text-anchor="middle">LE COMPTAGE</text>
  <text class="body" x="1405" y="512" font-size="23" text-anchor="middle">On compte chaque nuit où il</text>
  <text class="body" x="1405" y="544" font-size="23" text-anchor="middle">a fait <tspan class="strong">0 °C ou moins.</tspan></text>
  <text class="body" x="1405" y="580" font-size="21" text-anchor="middle">→ variable « TN » de Météo-France</text>

  <!-- ============ RESULTAT ============ -->
  <text class="eyebrow" x="840" y="640" font-size="20" text-anchor="middle">LE RÉSULTAT POUR DIJON</text>
  <g filter="url(#soft)">
    <rect x="420" y="656" width="840" height="84" rx="42" fill="#0F1E27"/>
  </g>
  <text x="840" y="709" font-size="34" text-anchor="middle" fill="#FFFFFF"
        font-family="'Segoe UI','Space Grotesk',sans-serif" font-weight="600">439 jours de gel sur 10 ans&#160;&#160;·&#160;&#160;≈ 49 par an</text>

  <!-- ============ BANDE : LES 2 DIFFICULTES ============ -->
  <text class="notettl" x="60" y="792" font-size="20">LES 2 PETITES DIFFICULTÉS QU'ON A RÉGLÉES</text>

  <!-- difficulte 1 -->
  <g>
    <rect x="60" y="814" width="760" height="120" rx="12" fill="#FFFFFF" stroke="#C7D5DC"/>
    <rect x="60" y="814" width="6" height="120" rx="3" fill="#C2410C"/>
    <circle cx="118" cy="874" r="26" fill="#FDEEE4"/>
    <text x="118" y="886" font-size="30" text-anchor="middle" fill="#C2410C" font-weight="700">!</text>
    <text class="note" x="166" y="860" font-size="23"><tspan class="strong" style="fill:#0F1E27;">Des stations sans thermomètre.</tspan> Beaucoup ne mesurent</text>
    <text class="note" x="166" y="892" font-size="23">que la pluie → on prend la 1re station <tspan class="strong" style="fill:#0F1E27;">utilisable</tspan> parmi</text>
    <text class="note" x="166" y="922" font-size="23">les 5 plus proches.</text>
  </g>

  <!-- difficulte 2 -->
  <g>
    <rect x="860" y="814" width="760" height="120" rx="12" fill="#FFFFFF" stroke="#C7D5DC"/>
    <rect x="860" y="814" width="6" height="120" rx="3" fill="#15598F"/>
    <circle cx="918" cy="874" r="26" fill="#E4EEF6"/>
    <text x="918" y="886" font-size="30" text-anchor="middle" fill="#15598F" font-weight="700">≈</text>
    <text class="note" x="966" y="860" font-size="23"><tspan class="strong" style="fill:#0F1E27;">Des fichiers énormes</tspan> (des centaines de Mo).</text>
    <text class="note" x="966" y="892" font-size="23">On les lit <tspan class="strong" style="fill:#0F1E27;">par petits morceaux</tspan> pour ne pas</text>
    <text class="note" x="966" y="922" font-size="23">faire planter l'ordinateur.</text>
  </g>
</svg>
